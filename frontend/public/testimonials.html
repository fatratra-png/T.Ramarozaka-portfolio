<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Testimonials — what students, collaborators and clients say about Tokimahery Ramarozaka."
    />
    <title>Tokimahery Ramarozaka — Testimonials</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="icon" href="assets/logo.png" type="image/png" />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      rel="shortcut icon"
      href="/frontend/public/assets/logo.png"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="style.css" />
    <script src="main.js" type="module"></script>
  </head>
  <body>
    <header class="navbar" id="navbar">
      <a class="navbar__brand" href="index.html">
        <img
          src="assets/logo.png"
          alt="Tokimahery Ramarozaka — Home"
          class="h-12.5"
        />
      </a>
      <nav
        class="navbar__nav"
        id="navbar-nav"
        aria-label="Primary navigation"
      ></nav>
      <button
        class="navbar__hamburger"
        id="navbar-hamburger"
        aria-label="Toggle navigation"
        aria-expanded="false"
        aria-controls="navbar-nav"
      >
        <span class="navbar__hamburger-bar"></span>
        <span class="navbar__hamburger-bar"></span>
        <span class="navbar__hamburger-bar"></span>
      </button>
      <div class="navbar__controls">
        <input
          class="navbar__search-input"
          type="search"
          placeholder="Search anything..."
          id="navbar-search"
          aria-label="Search"
        />
        <div class="navbar__cart-wrapper" id="navbar-cart-wrapper">
          <button
            class="navbar__cart-button"
            id="navbar-cart-button"
            aria-label="Shopping cart"
          >
            <i class="fa-solid fa-basket-shopping fa-xl" aria-hidden="true"></i>
          </button>
        </div>
      </div>
    </header>

    <section class="testi-page" aria-labelledby="testi-page-heading">
      <div class="testi-page__container">
        <div class="page-header">
          <div class="page-header__eyebrow" aria-hidden="true">
            <span class="page-header__eyebrow-line"></span>
            <span class="page-header__eyebrow-label">Social Proof</span>
            <span class="page-header__eyebrow-line"></span>
          </div>
          <h1 class="page-header__heading" id="testi-page-heading">
            What people <br /><em class="page-header__heading-italic">say</em>
          </h1>
          <p class="page-header__subtitle">
            Hundreds of students, collaborators, and clients have trusted
            Tokimahery's expertise. Here's what they have to say.
          </p>
        </div>
        <div id="testimonials-sections"></div>
      </div>
    </section>

    <footer class="testi-footer" aria-label="Call to action">
      <h2 class="testi-footer__heading">Join them.</h2>
      <p class="testi-footer__text">
        Whether you want to learn, collaborate, or get something built —
        Tokimahery is ready to help you move forward.
      </p>
      <div class="testi-footer__actions">
        <a
          href="courses.html"
          class="testi-footer__btn testi-footer__btn--primary"
          >Book a course</a
        >
        <a
          href="contact.html"
          class="testi-footer__btn testi-footer__btn--secondary"
          >Collaborate</a
        >
      </div>
    </footer>
  </body>
</html>
