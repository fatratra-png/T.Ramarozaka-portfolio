<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Research papers by Tokimahery Ramarozaka — academic work on multi-agent systems and normative frameworks."
    />
    <title>Tokimahery Ramarozaka — Research</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="icon" href="assets/logo.png" type="image/png" />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="style.css" />
    <script src="main.js" type="module"></script>
  </head>
  <body>
    <header class="navbar" id="navbar">
      <a class="navbar__brand" href="index.html">
        <img
          src="assets/logo.png"
          alt="Tokimahery Ramarozaka — Home"
          class="h-12.5"
        />
      </a>
      <nav
        class="navbar__nav"
        id="navbar-nav"
        aria-label="Primary navigation"
      ></nav>
      <button
        class="navbar__hamburger"
        id="navbar-hamburger"
        aria-label="Toggle navigation"
        aria-expanded="false"
        aria-controls="navbar-nav"
      >
        <span class="navbar__hamburger-bar"></span>
        <span class="navbar__hamburger-bar"></span>
        <span class="navbar__hamburger-bar"></span>
      </button>
      <div class="navbar__controls">
        <input
          class="navbar__search-input"
          type="search"
          placeholder="Search anything..."
          id="navbar-search"
          aria-label="Search"
        />
        <div class="navbar__cart-wrapper" id="navbar-cart-wrapper">
          <button
            class="navbar__cart-button"
            id="navbar-cart-button"
            aria-label="Shopping cart"
          >
            <i class="fa-solid fa-basket-shopping fa-xl" aria-hidden="true"></i>
          </button>
        </div>
      </div>
    </header>

    <section class="research-page" aria-labelledby="research-page-heading">
      <div class="research-page__container">
        <div class="page-header">
          <div class="page-header__eyebrow" aria-hidden="true">
            <span class="page-header__eyebrow-line"></span>
            <span class="page-header__eyebrow-label">Academic Work</span>
            <span class="page-header__eyebrow-line"></span>
          </div>
          <h1 class="page-header__heading" id="research-page-heading">
            Research <em class="page-header__heading-italic">papers</em>
          </h1>
          <p class="page-header__subtitle">
            My academic work focuses on multi-agent systems and normative
            frameworks, exploring how autonomous agents coordinate through norms
            and social structures in complex, distributed environments.
          </p>
        </div>
        <div class="bg-white py-15">
          <div class="papers-list" id="papers-list"></div>
        </div>
      </div>
    </section>

    <section class="cta-banner" id="cta-banner" aria-labelledby="cta-heading">
      <h2 class="cta-banner__heading" id="cta-heading"></h2>
      <p class="cta-banner__subheading" id="cta-subheading"></p>
      <button class="cta-banner__button" id="cta-button" type="button"></button>
    </section>
  </body>
</html>
