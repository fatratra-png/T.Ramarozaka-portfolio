<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tokimahery Ramarozaka — Portfolio & Services</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="style.css" />
    <script src="main.js" type="module"></script>
  </head>

  <body>
    <!-- ════════════════════════════════
       NAVBAR
  ════════════════════════════════ -->
    <header class="navbar" id="navbar">
      <a class="navbar__brand" href="index.html">
        <img src="assets/logo.png" alt="Logo" class="h-12.5" />
      </a>

      <nav
        class="navbar__nav"
        id="navbar-nav"
        aria-label="Primary navigation"
      ></nav>

      <!-- Hamburger (mobile only) -->
      <button
        class="navbar__hamburger"
        id="navbar-hamburger"
        aria-label="Toggle navigation"
        aria-expanded="false"
        aria-controls="navbar-nav"
      >
        <span class="navbar__hamburger-bar"></span>
        <span class="navbar__hamburger-bar"></span>
        <span class="navbar__hamburger-bar"></span>
      </button>

      <div class="navbar__controls">
        <input
          class="navbar__search-input"
          type="search"
          placeholder="Search anything..."
          id="navbar-search"
          aria-label="Search"
        />
        <div class="navbar__cart-wrapper" id="navbar-cart-wrapper">
          <button
            class="navbar__cart-button"
            id="navbar-cart-button"
            aria-label="Shopping cart"
          >
            <i class="fa-solid fa-basket-shopping fa-xl"></i>
          </button>
        </div>
      </div>
    </header>

    <!-- ════════════════════════════════
       HERO
  ════════════════════════════════ -->
    <section class="hero" id="hero" aria-labelledby="hero-heading">
      <div class="hero__container">
        <div class="hero__content">
          <div class="hero__eyebrow">
            <span class="hero__eyebrow-line"></span>
            <span class="hero__eyebrow-label">Portfolio &amp; Services</span>
          </div>

          <h1 class="hero__heading" id="hero-heading">
            <span class="hero__heading-firstname" id="hero-firstname"></span>
            <span class="hero__heading-lastname" id="hero-lastname"></span>
          </h1>

          <p class="hero__roles" id="hero-roles"></p>
          <p class="hero__description" id="hero-description"></p>

          <div class="hero__actions">
            <button class="hero__btn-primary" id="hero-cta-courses">
              Book a course
            </button>
            <button class="hero__btn-secondary" id="hero-cta-about">
              About me
            </button>
          </div>

          <a class="hero__collab-link" href="../public/contact.html">
            Ask for a collaboration →
          </a>

          <div
            class="hero__socials"
            id="hero-socials"
            aria-label="Social media links"
          ></div>
        </div>

        <div class="hero__visual">
          <div class="hero__image-frame">
            <img
              class="hero__frame-bg"
              src="./assets/template.svg"
              alt=""
              aria-hidden="true"
            />
            <div class="hero__image-circle">
              <img class="hero__image" id="hero-photo" src="" alt="" />
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- ════════════════════════════════
       ABOUT ME
  ════════════════════════════════ -->
    <section class="about" id="about" aria-labelledby="about-heading">
      <div class="about__container">
        <div class="about__left">
          <div class="about__eyebrow">
            <span class="about__eyebrow-line"></span>
            <span class="about__eyebrow-label">Who I am</span>
          </div>
          <h2 class="about__heading" id="about-heading">
            <span class="about__heading-plain">About</span>
            <span class="about__heading-italic">me</span>
          </h2>
        </div>

        <div class="about__body">
          <p class="about__paragraph" id="about-part1"></p>
          <p class="about__paragraph" id="about-part2"></p>
          <div
            class="about__stats"
            id="about-stats"
            aria-label="Key statistics"
          ></div>
        </div>
      </div>
    </section>

    <!-- ════════════════════════════════
       HOME — COURSES PREVIEW
  ════════════════════════════════ -->
    <section
      class="home-courses"
      id="home-courses"
      aria-labelledby="home-courses-heading"
    >
      <div class="home-courses__container">
        <div class="home-courses__header" aria-hidden="true">
          <span class="home-courses__header-line"></span>
          <span class="home-courses__header-label">Learning</span>
          <span class="home-courses__header-line"></span>
        </div>

        <h2 class="home-courses__heading" id="home-courses-heading">
          Courses <em class="home-courses__heading-italic">online</em><br />and
          offline
        </h2>

        <div class="home-courses__grid" id="home-courses-grid"></div>

        <div class="home-courses__cta">
          <a class="home-courses__cta-link" href="courses.html"
            >View all courses →</a
          >
        </div>
      </div>
    </section>

    <!-- ════════════════════════════════
       EXPERIENCE
  ════════════════════════════════ -->
    <section
      class="experience"
      id="experience"
      aria-labelledby="experience-heading"
    >
      <div class="experience__container">
        <div class="experience__eyebrow">
          <span class="experience__eyebrow-line"></span>
          <span class="experience__eyebrow-label">Background</span>
        </div>

        <h2 class="experience__heading" id="experience-heading">Experience</h2>

        <div class="experience__grid" id="experience-grid"></div>
      </div>
    </section>

    <!-- ════════════════════════════════
       CTA BANNER
  ════════════════════════════════ -->
    <section class="cta-banner" id="cta-banner" aria-labelledby="cta-heading">
      <h2 class="cta-banner__heading" id="cta-heading"></h2>
      <p class="cta-banner__subheading" id="cta-subheading"></p>
      <button class="cta-banner__button" id="cta-button"></button>
    </section>
  </body>
</html>
